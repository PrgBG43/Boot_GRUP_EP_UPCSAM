[alembic]
# Carpeta donde se guardarán las migraciones
script_location = alembic

# Plantilla para los nombres de los archivos de migración
file_template = %%(rev)s_%%(slug)s

# No pongas la URL aquí, la estamos pasando dinámicamente en env.py
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Esto es opcional, sirve para auto-formatear el código (puedes dejarlo vacío)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S