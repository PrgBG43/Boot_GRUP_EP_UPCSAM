services:
  db:
    image: postgres:15-alpine
    container_name: rastreo_db_cont
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - rastreo_network

  app:
    build: .
    container_name: fastapi_app_cont
    env_file:
      - .env
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - rastreo_network

networks:
  rastreo_network:
    driver: bridge

volumes:
  postgres_data: